name: Full Build on macOS

# Open a new branch 'macosbuild' and push this workflow to it.
# Maybe adjust the version as well.
#
# git checkout -b macosbuild
# edit lib/ChordPro/Version.pm
# git commit --no-verify --allow-empty -am "Force macOS build."
# git push --set-upstream origin macosbuild
#
# git checkout dev
# git branch -D macosbuild
# git push origin :macosbuild

on:
  push:
    branches:
      - macosbuild

env:

  # wxWidgets
  WX:  3.2

  # Alien::wxWidgets and wxPerl
  AWV: 0.72
  WXP: 3.009

jobs:

 macOS:
    # macOS 15-intel
    # macOS latest  = Apple Silicon (ARM)
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: macos-intel
            os: macos-15-intel
            arch: INTEL
          - platform_name: macos-arm
            os: macos-latest
            arch: ARM

    runs-on: ${{ matrix.os }}

    steps:

      - name: Check out repository code
        uses: actions/checkout@v5

      - run: perl -V

      - name: Install cpanm
        run: brew install cpanm

      # Harfbuzz seems to be present on the runners. Better safe than sorry.
      - name: Install harfbuzz
        run: brew install harfbuzz

      # Webp seems to be present on the Intel runners. Better safe than sorry.
      - name: Install webp
        run: brew install webp

      # Install wxWidgets
      - name: Set up wxWidgets
        run: |
          brew install wxwidgets@${{ env.WX }}

      - name: Link wx-config, if needed
        if: env.WX == '3.2'
        run: |
          sudo install `which wx-config-$WX` /usr/local/bin/wx-config

      - run: wx-config --version

      - name: Install SSLeay, ExtUtils::XSpp
        run: |
          cpanm Net::SSLeay --notest
          cpanm ExtUtils::XSpp --notest

      - name: Install Alien::wxWidgets
        run: |
          curl -o awx.tgz -L https://github.com/sciurius/perl-Alien-wxWidgets/releases/download/R0.71/Alien-wxWidgets-$AWV.tar.gz
          tar xf awx.tgz
          cd Alien-wxWidgets-$AWV
          cpanm --installdeps --notest .
          perl ./Build.PL --wxWidgets-build=0
          perl ./Build
          perl ./Build install
          cd ..
          rm -fr Alien-wsWidgets-$AWV
          wx-config --list
          wx-config --version --release --version-full
          perl -MAlien::wxWidgets -e 'Alien::wxWidgets->libraries(qw(stc media webview propgrid ribbon aui xrc qa html))'

      # No use to proceed if we do not have all wx components.
      - name: Check libraries
        run: perl pp/macos/libtool.pl

      - name: Install wxPerl
        run: |
          cpanm https://github.com/sciurius/wxPerl/releases/download/R$WXP/Wx-$WXP.tar.gz --notest || ( cat $HOME/.cpanm/build.log; false )

      - name: Install other dependencies
        run: |
          cpanm PAR::Packer HarfBuzz::Shaper
          cpanm --installdeps --notest .

      - name: Run Test suite
        run: |
          prove -l t
          perl script/chordpro.pl --about

      - name: Build DMG
        run: make -C pp/macos WEBP=1

      - uses: actions/upload-artifact@v7
        with:
          compression-level: 0
          name: Upload_DMG_macOS_${{ matrix.arch }}
          path: pp/macos/ChordPro*${{ matrix.arch }}.dmg
